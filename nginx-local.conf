server {
    listen 18080;
    server_name localhost 127.0.0.1;

    # 仅监听本机。鉴权由前端处理(用户在工具栏输入用户名/密码),nginx 只做反向代理。
    allow 127.0.0.1;
    allow ::1;
    deny all;

    location = / {
        return 302 /dashboard/;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        alias ${DASHBOARD_ROOT}/;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location /nacos/ {
        # 上游 Nacos 地址由前端弹窗设置(默认 127.0.0.1:8848)。
        # 修改方式:浏览器里弹窗输入 URL,reload-server.py 会自动改这一行并 reload nginx。
        proxy_pass http://127.0.0.1:8848/nacos/
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 鉴权由前端处理:用户在工具栏输入用户名/密码,登录后拿到的 accessToken 走 query string (?accessToken=xxx)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 管理接口:接收前端弹窗的 Nacos URL 更新,只允许本机访问
    location /__admin__/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:18081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}